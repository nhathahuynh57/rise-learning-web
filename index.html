            display: inline-block;

            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function speakListening(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.75; // Tốc độ đọc chậm vừa phải cho phần nghe chép
            window.speechSynthesis.speak(utterance);
        }

        // --- HÀM HỖ TRỢ CHẤM ĐIỂM ---
        function isCorrectText(user, correct) {
            if(!user || !correct) return false;
            // Xóa dấu câu, khoảng trắng thừa và đưa về chữ thường để so sánh
            const cUser = user.toLowerCase().replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ').trim();
            const cCorrect = correct.toLowerCase().replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ').trim();
            return cUser === cCorrect;
        }

        function generateDiffHTML(userAns, correctAns) {
            if (!userAns) return '<span>(Bạn chưa nhập câu trả lời)</span>';
            const userWords = userAns.trim().split(/\s+/);
            const correctWords = correctAns.trim().split(/\s+/);
            let result = [];
            
            for (let i = 0; i < userWords.length; i++) {
                const cleanUser = userWords[i].toLowerCase().replace(/[.,!?;:]/g, '');
                const cleanCorrect = correctWords[i] ? correctWords[i].toLowerCase().replace(/[.,!?;:]/g, '') : '';
                
                if (cleanUser === cleanCorrect) {
                    result.push(userWords[i]);
                } else {
                    result.push(`<span class="text-red-600 font-extrabold underline decoration-2">${userWords[i]}</span>`);
                }
            }
            return result.join(' ');
        }

            const lesson = lessons[currentLessonIndex];
            if (!lesson || !lesson.questions || lesson.questions.length === 0) return;
            
            lesson.questions.forEach((q, i) => {
                if (lesson.type === "grammar") {
                    if (lesson.studentAnswers[i]) {
                        q.ans.forEach((_, bi) => {
                            const el = document.getElementById(`g-input-${i}-${bi}`);
                            if(el) lesson.studentAnswers[i][bi] = el.value.trim();
                        });
                    }
                } else if (lesson.type === "mcq" || lesson.type === "grammar_rules" || lesson.type === "vocab") {
                    const checked = document.querySelector(`input[name="q${i}"]:checked`);
                    lesson.studentAnswers[i] = checked ? checked.value : null;
                } else if (lesson.type === "listening") {
                    const el = document.getElementById(`l-input-${i}`);
                    if(el) lesson.studentAnswers[i] = el.value.trim();
                } else {
                    const el = document.getElementById(`w-input-${i}`);
                    if(el) lesson.studentAnswers[i] = el.value.trim();
                }
            });
        }

        function renderView() {
            const lesson = lessons[currentLessonIndex];
            if (!lesson) return;

            const container = document.getElementById('main-container');
            if (lesson.type === "grammar_rules") {
                container.classList.add('grammar-grid');
            } else {
                container.classList.remove('grammar-grid');
            }

            document.querySelectorAll('.nav-pill').forEach((btn, i) => {
                if(i === currentLessonIndex) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            document.getElementById('main-title').innerText = lesson.title;
            document.getElementById('sub-title').innerText = lesson.sub;

            const passageBox = document.getElementById('passage-content');
            if (lesson.type === "vocab") {
                document.getElementById('left-heading').innerText = "DANH SÁCH TỪ VỰNG";
                passageBox.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3">${lesson.content.map(item => {
                    const parts = item.split(':');
                    const engPart = parts[0].split('/')[0].trim();
                    return `<div class="p-3 bg-indigo-50/50 rounded-xl border border-indigo-100 flex justify-between items-center group hover:bg-white transition-all">
                        <div class="flex-grow"><span class="text-indigo-900 font-bold group-hover:text-orange-600">${parts[0]}</span>: <span class="text-slate-600 font-bold">${parts[1]}</span></div>
                        <button onclick="speak('${engPart}')" class="speaker-btn ml-2 p-2 rounded-full hover:bg-indigo-100/50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        </button>
                    </div>`;
                }).join('')}</div>`;
            } else if (lesson.type === "grammar_rules") {
                document.getElementById('left-heading').innerText = "KIẾN THỨC TRỌNG TÂM";
                const data = lesson.content;
                passageBox.innerHTML = `
                    <h2 class="text-lg font-bold text-slate-800 mb-2">Grammar: The continuous present tense – (Thì hiện tại tiếp diễn)</h2>
                    <table class="grammar-table">
                        <thead><tr><th>THỂ</th><th>CẤU TRÚC</th><th>VÍ DỤ</th></tr></thead>
                        <tbody>${data.table.map(r => `<tr><td>${r.type}</td><td>${r.struct}</td><td>${r.ex}</td></tr>`).join('')}</tbody>
                    </table>
                    <div class="mt-6">
                        <h3 class="font-bold text-lg mb-2 text-slate-900">Dấu hiệu nhận biết thì hiện tại tiếp diễn:</h3>
                        <ul class="list-none ml-2 space-y-1 font-bold">${data.signals.map(s => `<li>• <span class="text-orange-600">${s.key}:</span> ${s.val}</li>`).join('')}</ul>
                    </div>
                    <div class="mt-6 p-4 bg-orange-50 border-l-4 border-orange-400 rounded-lg">
                        <p class="font-bold text-red-600 mb-2 uppercase text-xs">Note:</p>
                        ${data.notes.map(n => `<div class="mb-3"><p class="font-bold text-slate-800 underline mb-1">${n.title}</p><ul class="list-none ml-4 text-sm font-bold space-y-1">${n.items.map(i => `<li>- ${i}</li>`).join('')}</ul></div>`).join('')}
                    </div>`;
            } else if (lesson.type === "grammar") {
                document.getElementById('left-heading').innerText = "HƯỚNG DẪN LÀM BÀI";
                passageBox.innerHTML = `
                    <div class="bg-indigo-50 p-8 rounded-[2rem] border-2 border-indigo-100 shadow-sm">
                        <p class="text-slate-900 font-bold text-xl mb-6">Put the verbs in the correct form (Present Continuous)</p>
                        <p class="text-slate-600 font-bold mb-4 uppercase text-sm tracking-wider">Example:</p>
                        <div class="text-[1.25rem] font-bold text-slate-800 leading-[3rem] bg-white p-6 rounded-2xl border border-indigo-200">
                            ${lesson.example}
                        </div>
                    </div>`;
            } else if (lesson.type === "listening") {
                document.getElementById('left-heading').innerText = "HƯỚNG DẪN";
                passageBox.innerHTML = `
                    <div class="bg-orange-50 p-8 rounded-[2rem] border-2 border-orange-100">
                        <p class="text-slate-700 font-bold text-lg leading-relaxed mb-4">Bài tập luyện nghe chép chính tả (Dictation).</p>
                        <ul class="text-slate-600 font-bold space-y-2 ml-4 list-disc">
                            <li>Bấm vào biểu tượng <strong>Cái loa</strong> ở mỗi câu để nghe máy đọc.</li>
                            <li>Tốc độ đọc ở mức vừa phải. Bạn có thể bấm nghe lại nhiều lần.</li>
                            <li>Gõ chính xác câu bạn nghe được vào ô trống bên dưới.</li>
                            <li>Sau khi nộp bài, hệ thống sẽ hiển thị câu tiếng Anh chuẩn để bạn đối chiếu.</li>
                        </ul>
                    </div>`;
            } else {
                document.getElementById('left-heading').innerText = "HƯỚNG DẪN";
                passageBox.innerHTML = `<div class="bg-orange-50 p-8 rounded-[2rem] border-2 border-orange-100"><p class="text-slate-700 font-bold text-lg leading-relaxed">Hãy hoàn thành các bài tập ở cột bên phải để củng cố kiến thức ngữ pháp và từ vựng của Buổi 1.</p></div>`;
            }

            const contentBox = document.getElementById('content-box');
            contentBox.innerHTML = '';
            document.getElementById('right-title').innerText = isGlobalSubmitted ? "KẾT QUẢ CHI TIẾT" : "PHẦN LÀM BÀI";

            if (lesson.questions && lesson.questions.length > 0) {
                lesson.questions.forEach((item, i) => {
                    const div = document.createElement('div');
                    div.className = "fade-in transition-all";

                    if (lesson.type === "grammar") {
                        div.className += " grammar-item-card"; 
                        let questionHtml = item.text;
                        let sentenceCorrect = true;

                        item.ans.forEach((_, bi) => {
                            const val = (lesson.studentAnswers[i] && lesson.studentAnswers[i][bi]) || "";
                            if (!isGlobalSubmitted) {
                                questionHtml = questionHtml.replace('{blank}', `<input type="text" id="g-input-${i}-${bi}" value="${val}" class="grammar-input" placeholder=".........">`);
                            } else {
                                const isCorrect = isCorrectText(val, item.ans[bi]);
                                if (!isCorrect) sentenceCorrect = false;

                                if (isCorrect) {
                                    questionHtml = questionHtml.replace('{blank}', `<span class="grammar-input bg-emerald-500 text-white min-w-[200px] inline-block text-center">${val}</span>`);
                                } else {
                                    const wrongHTML = val ? `<span class="grammar-input bg-red-500 text-white line-through opacity-90 min-w-[100px] inline-block text-center mr-2">${val}</span>` : `<span class="grammar-input bg-red-500 text-white opacity-90 min-w-[100px] inline-block text-center mr-2">(Trống)</span>`;
                                    const correctHTML = `<span class="grammar-input bg-emerald-500 text-white min-w-[150px] inline-block text-center">${item.ans[bi]}</span>`;
                                    questionHtml = questionHtml.replace('{blank}', wrongHTML + correctHTML);
                                }
                            }
                        });

                        if (!isGlobalSubmitted) {
                            div.innerHTML = `<div class="text-[1.25rem] font-bold text-slate-800 leading-[3.5rem]">${questionHtml}</div>`;
                        } else {
                            const iconHTML = sentenceCorrect ? `✅` : `❌`;
                            div.innerHTML = `
                                <div class="flex gap-4 items-start">
                                    <span class="text-2xl mt-4">${iconHTML}</span>
                                    <div class="text-[1.25rem] font-bold text-slate-800 leading-[3.5rem] flex-grow">${questionHtml}</div>
                                </div>
                                <div class="mt-4 p-4 bg-indigo-50 rounded-xl border-l-8 border-indigo-500 font-bold text-indigo-900 ml-10">Giải thích: ${item.exp}</div>
                            `;
                        }
                    } else if (lesson.type === "mcq" || lesson.type === "grammar_rules" || lesson.type === "vocab") {
                        div.className += " p-8 bg-white rounded-[2rem] border shadow-sm mb-6";
                        const userSel = lesson.studentAnswers[i];
                        if (!isGlobalSubmitted) {
                            div.innerHTML = `<p class="text-lg font-bold mb-6">${i+1}. ${item.q}</p><div class="grid grid-cols-1 gap-3">${item.options.map((opt, oi) => `<label class="flex items-center gap-4 p-4 border-2 rounded-2xl cursor-pointer hover:bg-indigo-50 transition-all shadow-sm"><input type="radio" name="q${i}" value="${String.fromCharCode(65 + oi)}" ${userSel === String.fromCharCode(65 + oi) ? 'checked' : ''} class="w-5 h-5 accent-indigo-600"><span class="text-gray-800 font-bold">${String.fromCharCode(65 + oi)}. ${opt}</span></label>`).join('')}</div>`;
                        } else {
                            const isCorrect = userSel === item.ans;
                            const iconHTML = isCorrect ? `✅` : `❌`;
                            div.classList.add(isCorrect ? 'correct-bg' : 'wrong-bg');
                            div.innerHTML = `
                                <div class="flex items-start gap-4">
                                    <span class="text-2xl mt-1">${iconHTML}</span>
                                    <div class="flex-grow">
                                        <p class="text-lg font-bold mb-4">${i+1}. ${item.q}</p>
                                        <div class="grid grid-cols-1 gap-2">${item.options.map((opt, oi) => {const char = String.fromCharCode(65 + oi); return `<div class="p-3 border-2 rounded-xl text-lg ${item.ans === char ? 'bg-green-50 border-green-500 font-bold text-green-700' : (userSel === char ? 'bg-red-50 border-red-500 text-red-700' : 'bg-white opacity-40')}">${char}. ${opt}</div>`}).join('')}</div>
                                        <p class="mt-4 text-sm font-bold text-indigo-800">Ghi chú: ${item.exp}</p>
                                    </div>
                                </div>`;
                        }
                    } else if (lesson.type === "translation") {
                        div.className += " p-8 bg-white rounded-[2rem] border shadow-sm mb-6";
                        if (!isGlobalSubmitted) {
                            div.innerHTML = `<div class="translation-prompt-box"><span class="vi-translation-text">${i+1}. ${item.vi}</span></div><textarea id="w-input-${i}" class="writing-input border-indigo-100" rows="2" placeholder="Gõ câu dịch của bạn...">${lesson.studentAnswers[i] || ""}</textarea>`;
                        } else {
                            const isCorrect = isCorrectText(lesson.studentAnswers[i], item.ans);
                            const iconHTML = isCorrect ? `✅` : `❌`;
                            const diffAns = generateDiffHTML(lesson.studentAnswers[i], item.ans);

                            div.innerHTML = `
                                <div class="flex items-center gap-4 mb-4">
                                    <span class="text-2xl">${iconHTML}</span>
                                    <div class="translation-prompt-box !mb-0 w-auto flex-grow"><span class="vi-translation-text">${item.vi}</span></div>
                                </div>
                                <div class="space-y-4 ml-10">
                                    <div class="p-4 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'} border rounded-2xl shadow-inner">
                                        <p class="text-xs font-bold ${isCorrect ? 'text-emerald-500' : 'text-red-500'} uppercase mb-1">BÀI LÀM:</p>
                                        <p class="text-slate-900 font-bold text-lg">${diffAns}</p>
                                    </div>
                                    ${!isCorrect ? `<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl"><p class="text-xs font-bold text-emerald-600 uppercase mb-1">ĐÁP ÁN CHUẨN:</p><p class="text-emerald-950 font-bold text-lg">${item.ans}</p></div>` : ''}
                                </div>
                            `;
                        }
                    } else if (lesson.type === "listening") {
                        div.className += " p-8 bg-white rounded-[2rem] border shadow-sm mb-6";
                        if (!isGlobalSubmitted) {
                            div.innerHTML = `
                                <div class="flex items-center gap-6 mb-6">
                                    <span class="text-3xl font-bold text-slate-800">${i+1})</span>
                                    <button onclick="speakListening('${item.audioText.replace(/'/g, "\\'")}')" class="p-4 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition-colors shadow-sm cursor-pointer border border-orange-200">
                                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
                                    </button>
                                </div>
                                <input type="text" id="l-input-${i}" class="w-full p-5 border-2 border-orange-300 rounded-[2rem] text-center text-xl outline-none focus:border-orange-500 text-slate-800 font-bold placeholder-gray-300" placeholder="Gõ câu trả lời của bạn ..." value="${lesson.studentAnswers[i] || ""}">
                            `;
                        } else {
                            const isCorrect = isCorrectText(lesson.studentAnswers[i], item.audioText);
                            const iconHTML = isCorrect ? `✅` : `❌`;
                            const diffAns = generateDiffHTML(lesson.studentAnswers[i], item.audioText);

                            div.innerHTML = `
                                <div class="flex items-center gap-6 mb-6">
                                    <span class="text-3xl font-bold text-slate-800">${i+1})</span>
                                    <button onclick="speakListening('${item.audioText.replace(/'/g, "\\'")}')" class="p-3 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition-colors shadow-sm cursor-pointer border border-orange-200">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
                                    </button>
                                    <span class="text-2xl">${iconHTML}</span>
                                    <span class="text-2xl font-bold text-slate-800">${item.audioText}</span>
                                </div>
                                <div class="space-y-4">
                                    <div class="p-4 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'} border rounded-2xl shadow-inner">
                                        <p class="text-xs font-bold ${isCorrect ? 'text-emerald-500' : 'text-red-500'} uppercase mb-1">BÀI LÀM CỦA BẠN:</p>
                                        <p class="text-slate-900 font-bold text-lg">${diffAns}</p>
                                    </div>
                                    ${!isCorrect ? `<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl"><p class="text-xs font-bold text-emerald-600 uppercase mb-1">ĐÁP ÁN CHUẨN:</p><p class="text-emerald-950 font-bold text-lg">${item.audioText}</p></div>` : ''}
                                </div>
                            `;
                        }
                    }
                    contentBox.appendChild(div);
                });
            }
        }

        function handleGlobalSubmit() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) { alert("VUI LÒNG NHẬP HỌ VÀ TÊN!"); return; }
            saveCurrentState();
            isGlobalSubmitted = true;
            
            // Tính toán điểm số toàn bộ bài thi
            let totalScore = 0;
            let totalQs = 0;
            lessons.forEach(lesson => {
                if(!lesson.questions) return;
                lesson.questions.forEach((q, i) => {
                    totalQs++;
                    if (lesson.type === "mcq" || lesson.type === "vocab" || lesson.type === "grammar_rules") {
                         if (lesson.studentAnswers[i] === q.ans) totalScore++;
                    } else if (lesson.type === "translation") {
                         if (isCorrectText(lesson.studentAnswers[i], q.ans)) totalScore++;
                    } else if (lesson.type === "listening") {
                         if (isCorrectText(lesson.studentAnswers[i], q.audioText)) totalScore++;
                    } else if (lesson.type === "grammar") {
                         let allBlanksCorrect = true;
                         q.ans.forEach((ansString, bi) => {
                             const val = (lesson.studentAnswers[i] && lesson.studentAnswers[i][bi]) || "";
                             if (!isCorrectText(val, ansString)) allBlanksCorrect = false;
                         });
                         if (allBlanksCorrect) totalScore++;
                    }
                });
            });

            // Hiển thị khung điểm ở footer
            document.getElementById('result-status').innerHTML = `
                <div class="flex items-center gap-6 bg-indigo-700 text-white px-10 py-4 rounded-2xl shadow-xl border-2 border-white/20">
                    <div>
                        <p class="font-bold text-2xl tracking-tight uppercase text-yellow-300 drop-shadow-md">ĐIỂM SỐ: ${totalScore} / ${totalQs}</p>
                        <p class="text-sm font-bold uppercase opacity-90 mt-1">Đã nộp bài thành công</p>
                    </div>
                    <div class="w-px h-12 bg-white/30"></div>
                    <p class="text-[11px] font-bold uppercase opacity-80 max-w-[150px]">Xem lại lỗi sai có dấu ❌ ở các Tab</p>
                </div>
            `;
            document.getElementById('result-status').classList.remove('hidden');

            emailjs.send('Datha_10090507', 'template_h1hch87', { student_name: name, score: `${totalScore} / ${totalQs}`, test_name: "Session 1 Final" });
            renderView();
            document.getElementById('result-status').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = () => renderView();
    </script>
</body>
</html>
